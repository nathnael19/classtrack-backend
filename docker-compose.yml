services:
  backend:
    build: .
    container_name: classtrack_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      - "ep-dry-silence-ai1wgg9u-pooler.c-4.us-east-1.aws.neon.tech:44.211.114.173"
    volumes:
      - .:/app
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: classtrack_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: classtrack_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - backend
    env_file:
      - .env

  celery_beat:
    build: .
    container_name: classtrack_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - backend
    env_file:
      - .env
